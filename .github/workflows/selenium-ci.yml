name: Selenium TestNG CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Java and Maven
        run: |
          java -version
          mvn -version

      - name: Run Selenium TestNG suite
        run: mvn clean test

      - name: Upload TestNG report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-report
          path: test-output/
